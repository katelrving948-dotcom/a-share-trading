<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股短线交易系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
:root {
  --bg: #0f1923;
  --card: #1a2a3a;
  --border: #2a3a4a;
  --text: #e0e6ed;
  --text-dim: #8a9aa8;
  --accent: #2196f3;
  --green: #00c853;
  --red: #ff5252;
  --orange: #ff9800;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Microsoft YaHei', sans-serif;
       background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

/* ─── 顶部导航 ─── */
.header { display: flex; align-items: center; justify-content: space-between;
          padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.logo { font-size: 22px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 10px; }
.logo span { color: var(--text); font-weight: 400; font-size: 14px; }
.nav { display: flex; gap: 4px; }
.nav button { background: none; border: none; color: var(--text-dim); padding: 8px 18px;
              border-radius: 8px; cursor: pointer; font-size: 14px; transition: all .2s; }
.nav button:hover { background: var(--card); color: var(--text); }
.nav button.active { background: var(--accent); color: #fff; }
.time-display { color: var(--text-dim); font-size: 13px; }

/* ─── 卡片 ─── */
.card { background: var(--card); border-radius: 12px; padding: 20px;
        border: 1px solid var(--border); margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px;
              display: flex; align-items: center; gap: 8px; }
.card-title .badge { background: var(--accent); color: #fff; font-size: 11px;
                     padding: 2px 8px; border-radius: 10px; }

/* ─── 市场概览统计 ─── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
             padding: 16px; text-align: center; }
.stat-card .num { font-size: 26px; font-weight: 700; margin: 4px 0; }
.stat-card .label { font-size: 12px; color: var(--text-dim); }
.stat-card .num.green { color: var(--green); }
.stat-card .num.red { color: var(--red); }
.stat-card .num.blue { color: var(--accent); }

/* ─── 表格 ─── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 12px; color: var(--text-dim); font-weight: 500;
     border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid rgba(42,58,74,0.5); }
tr:hover td { background: rgba(33,150,243,0.05); }
.code-link { color: var(--accent); cursor: pointer; text-decoration: none; font-weight: 500; }
.code-link:hover { text-decoration: underline; }
.up { color: var(--red); }
.down { color: var(--green); }
.up-bg { color: var(--red); font-weight: 600; }
.down-bg { color: var(--green); font-weight: 600; }

/* ─── 图表容器 ─── */
.chart-wrap { position: relative; width: 100%; }
.chart-wrap canvas { width: 100% !important; max-height: 450px; }

/* ─── 指标选择器 ─── */
.indicator-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.indicator-btn { background: var(--card); border: 1px solid var(--border); color: var(--text-dim);
                 padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all .2s; }
.indicator-btn:hover { border-color: var(--accent); color: var(--text); }
.indicator-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ─── 搜索框 ─── */
.search-box { display: flex; gap: 8px; margin-bottom: 16px; }
.search-box input { flex: 1; background: var(--card); border: 1px solid var(--border);
                    color: var(--text); padding: 8px 14px; border-radius: 8px; font-size: 14px; outline: none; }
.search-box input:focus { border-color: var(--accent); }
.search-box button { background: var(--accent); border: none; color: #fff; padding: 8px 20px;
                     border-radius: 8px; cursor: pointer; font-size: 14px; }

/* ─── 按钮 ─── */
.btn { background: var(--accent); border: none; color: #fff; padding: 10px 24px;
       border-radius: 8px; cursor: pointer; font-size: 14px; transition: all .2s; }
.btn:hover { filter: brightness(1.15); }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-outline { background: none; border: 1px solid var(--accent); color: var(--accent); }

/* ─── 加载动画 ─── */
.loading { text-align: center; padding: 40px; color: var(--text-dim); }
.spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border);
           border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── 信号标签 ─── */
.tag { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.tag-buy { background: rgba(0,200,83,0.15); color: var(--green); }
.tag-sell { background: rgba(255,82,82,0.15); color: var(--red); }
.tag-hold { background: rgba(255,152,0,0.15); color: var(--orange); }
.tag-score { background: rgba(33,150,243,0.15); color: var(--accent); }

/* ─── 响应式 ─── */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ─── 回测结果表 ─── */
.backtest-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 16px 0; }
.metric-card { text-align: center; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.2); }
.metric-card .val { font-size: 20px; font-weight: 700; }
.metric-card .lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* ─── 行情列表 ─── */
.quotes-refresh { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
.quotes-refresh .last-update { font-size: 12px; color: var(--text-dim); }

/* 底部 */
.footer { text-align: center; padding: 20px; color: var(--text-dim); font-size: 12px;
          border-top: 1px solid var(--border); margin-top: 40px; }

/* 移动端调整 */
@media (max-width: 768px) {
  .header { flex-direction: column; gap: 12px; }
  .nav { flex-wrap: wrap; justify-content: center; }
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
  .container { padding: 12px; }
}
</style>
</head>
<body>

<div class="container">
  <!-- 顶部导航 -->
  <div class="header">
    <div class="logo">📊 A股交易系统 <span>短线量化</span></div>
    <div class="nav">
      <button class="active" data-tab="dashboard">市场概览</button>
      <button data-tab="screen">选股</button>
      <button data-tab="chart">K线分析</button>
      <button data-tab="backtest">回测</button>
    </div>
    <div class="time-display" id="headerTime">--</div>
  </div>

  <!-- === 页面1: 市场概览 === -->
  <div class="tab-content active" id="tab-dashboard">
    <div class="stats-grid" id="marketStats">
      <div class="stat-card"><div class="label">股票总数</div><div class="num blue" id="statTotal">--</div></div>
      <div class="stat-card"><div class="label">上涨</div><div class="num red" id="statUp">--</div></div>
      <div class="stat-card"><div class="label">下跌</div><div class="num green" id="statDown">--</div></div>
      <div class="stat-card"><div class="label">涨停</div><div class="num red" id="statLimitUp">--</div></div>
      <div class="stat-card"><div class="label">跌停</div><div class="num green" id="statLimitDown">--</div></div>
      <div class="stat-card"><div class="label">平均涨幅</div><div class="num" id="statAvgChange">--</div></div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
      <div class="card">
        <div class="card-title">🏆 涨幅榜 TOP10</div>
        <div class="table-wrap"><table id="gainersTable"><tr><th>代码</th><th>名称</th><th>价格</th><th>涨幅</th><th>换手率</th><th>市值</th></tr></table></div>
      </div>
      <div class="card">
        <div class="card-title">📉 跌幅榜 TOP10</div>
        <div class="table-wrap"><table id="losersTable"><tr><th>代码</th><th>名称</th><th>价格</th><th>涨幅</th><th>换手率</th><th>市值</th></tr></table></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔍 搜索股票</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入代码或名称，例如 600519 或 贵州茅台" onkeyup="if(event.key==='Enter') searchStock()">
        <button onclick="searchStock()">搜索</button>
      </div>
      <div id="searchResults"></div>
    </div>
  </div>

  <!-- === 页面2: 选股 === -->
  <div class="tab-content" id="tab-screen">
    <div class="card">
      <div class="card-title" style="justify-content:space-between;">
        <span>🎯 选股结果</span>
        <button class="btn btn-sm" onclick="runScreen()">🔄 刷新选股</button>
      </div>
      <div id="screenResults">
        <div class="loading"><div class="spinner"></div><p style="margin-top:12px;">点击「刷新选股」开始分析</p></div>
      </div>
    </div>
  </div>

  <!-- === 页面3: K线分析 === -->
  <div class="tab-content" id="tab-chart">
    <div class="card">
      <div class="card-title">📈 K线技术分析</div>
      <div class="search-box">
        <input type="text" id="chartSearch" placeholder="输入股票代码，如 600519" value="600519" onkeyup="if(event.key==='Enter') loadChart()">
        <button onclick="loadChart()">分析</button>
      </div>
    </div>
    <div id="chartArea" style="display:none;">
      <div style="display:grid; grid-template-columns: 2fr 1fr; gap:16px;">
        <div class="card">
          <div class="card-title" id="chartStockName">--</div>
          <div class="indicator-bar">
            <button class="indicator-btn active" data-indicator="ma" onclick="toggleIndicator('ma')">均线</button>
            <button class="indicator-btn" data-indicator="macd" onclick="toggleIndicator('macd')">MACD</button>
            <button class="indicator-btn" data-indicator="rsi" onclick="toggleIndicator('rsi')">RSI</button>
            <button class="indicator-btn" data-indicator="kdj" onclick="toggleIndicator('kdj')">KDJ</button>
            <button class="indicator-btn" data-indicator="boll" onclick="toggleIndicator('boll')">布林带</button>
          </div>
          <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title">📊 信号 & 信息</div>
          <div id="stockInfoPanel"><p style="color:var(--text-dim);">加载中...</p></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📊 成交量</div>
        <div class="chart-wrap"><canvas id="volumeChart" style="max-height:150px;"></canvas></div>
      </div>
    </div>
  </div>

  <!-- === 页面4: 回测 === -->
  <div class="tab-content" id="tab-backtest">
    <div class="card">
      <div class="card-title" style="justify-content:space-between;">
        <span>📊 策略回测</span>
        <div style="display:flex; gap:8px;">
          <input type="number" id="backtestDays" value="120" style="width:70px; background:var(--card); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; font-size:13px;" placeholder="天数">
          <button class="btn btn-sm" onclick="runBacktest()">🔄 开始回测</button>
        </div>
      </div>
      <div id="backtestResults"><p style="color:var(--text-dim);">输入股票代码后点击开始回测（多个代码用逗号分隔）<br>示例: 600519,000858,300750,002415</p></div>
    </div>
  </div>

  <div class="footer">
    ⚠️ 本系统仅供学习研究参考，不构成投资建议 · 数据来源: 东方财富/新浪财经
  </div>
</div>

<script>
// ─── 全局状态 ───
let priceChart = null;
let volumeChart = null;
let chartData = null;
let activeIndicators = ['ma'];
let currentChartCode = '600519';

// ─── 导航切换 ───
document.querySelectorAll('.nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ─── 更新时间显示 ───
function updateTime() {
  const now = new Date();
  document.getElementById('headerTime').textContent = now.toLocaleString('zh-CN');
}
setInterval(updateTime, 1000);
updateTime();

// ─── 市场概览 ───
async function loadMarketOverview() {
  try {
    const res = await fetch('/api/market-overview');
    const data = await res.json();
    if (data.error) return;
    const s = data.stats;
    document.getElementById('statTotal').textContent = s.total;
    document.getElementById('statUp').textContent = s.up;
    document.getElementById('statDown').textContent = s.down;
    document.getElementById('statLimitUp').textContent = s.limit_up;
    document.getElementById('statLimitDown').textContent = s.limit_down;
    const avgEl = document.getElementById('statAvgChange');
    avgEl.textContent = s.avg_change + '%';
    avgEl.className = 'num ' + (s.avg_change >= 0 ? 'red' : 'green');

    // 涨幅榜
    let html = '<tr><th>代码</th><th>名称</th><th>价格</th><th>涨幅</th><th>换手率</th><th>市值</th></tr>';
    data.gainers.forEach(s => {
      html += `<tr><td><a class="code-link" onclick="showChart('${s.code}')">${s.code}</a></td>
        <td>${s.name}</td><td>${s.price?.toFixed(2)}</td>
        <td class="up">+${s.change_pct?.toFixed(2)}%</td>
        <td>${s.turnover_rate?.toFixed(1)}%</td>
        <td>${s.market_cap?.toFixed(0)}亿</td></tr>`;
    });
    document.querySelector('#gainersTable').innerHTML = html;

    // 跌幅榜
    html = '<tr><th>代码</th><th>名称</th><th>价格</th><th>涨幅</th><th>换手率</th><th>市值</th></tr>';
    data.losers.forEach(s => {
      html += `<tr><td><a class="code-link" onclick="showChart('${s.code}')">${s.code}</a></td>
        <td>${s.name}</td><td>${s.price?.toFixed(2)}</td>
        <td class="down">${s.change_pct?.toFixed(2)}%</td>
        <td>${s.turnover_rate?.toFixed(1)}%</td>
        <td>${s.market_cap?.toFixed(0)}亿</td></tr>`;
    });
    document.querySelector('#losersTable').innerHTML = html;
  } catch(e) { console.error(e); }
}

// ─── 选股 ───
async function runScreen() {
  const el = document.getElementById('screenResults');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px;">正在全市场分析，请稍候...</p></div>';
  try {
    const res = await fetch('/api/screen');
    const data = await res.json();
    if (data.error || !data.stocks || data.stocks.length === 0) {
      el.innerHTML = `<p style="color:var(--text-dim); padding:20px;">${data.message || '暂无结果'}</p>`;
      return;
    }
    let html = `<p style="margin-bottom:12px; color:var(--text-dim);">共选出 <b style="color:var(--accent);">${data.count}</b> 只标的 · ${data.timestamp}</p>`;
    html += '<div class="table-wrap"><table><tr><th>#</th><th>代码</th><th>名称</th><th>现价</th><th>涨幅</th><th>市值</th><th>换手率</th><th>评分</th><th>放量突破</th><th>均线金叉</th><th>MACD</th><th>KDJ</th><th>量价</th></tr>';
    data.stocks.forEach((s, i) => {
      html += `<tr>
        <td>${i + 1}</td>
        <td><a class="code-link" onclick="showChart('${s.code}')">${s.code}</a></td>
        <td>${s.name}</td>
        <td>${s.price?.toFixed(2)}</td>
        <td class="${s.change_pct >= 0 ? 'up' : 'down'}">${s.change_pct >= 0 ? '+' : ''}${s.change_pct?.toFixed(2)}%</td>
        <td>${s.market_cap?.toFixed(0)}亿</td>
        <td>${s.turnover_rate?.toFixed(1)}%</td>
        <td><span class="tag tag-score">${s.综合评分}</span></td>
        <td>${(s.放量突破 || 0).toFixed(0)}</td>
        <td>${(s.均线金叉 || 0).toFixed(0)}</td>
        <td>${(s.MACD || 0).toFixed(0)}</td>
        <td>${(s.KDJ || 0).toFixed(0)}</td>
        <td>${(s.量价配合 || 0).toFixed(0)}</td>
      </tr>`;
    });
    html += '</table></div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<p style="color:var(--red);">请求失败: ${e.message}</p>`;
  }
}

// ─── 搜索股票 ───
async function searchStock() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const el = document.getElementById('searchResults');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(q));
    const data = await res.json();
    if (!data.stocks || data.stocks.length === 0) {
      el.innerHTML = '<p style="color:var(--text-dim);">未找到匹配股票</p>';
      return;
    }
    let html = '<div class="table-wrap"><table><tr><th>代码</th><th>名称</th><th>价格</th><th>涨幅</th><th>板块</th><th>操作</th></tr>';
    data.stocks.forEach(s => {
      html += `<tr>
        <td>${s.code}</td><td>${s.name}</td>
        <td>${s.price?.toFixed(2)}</td>
        <td class="${s.change_pct >= 0 ? 'up' : 'down'}">${s.change_pct >= 0 ? '+' : ''}${s.change_pct?.toFixed(2)}%</td>
        <td>${s.board || ''}</td>
        <td><button class="btn btn-sm" onclick="showChart('${s.code}')">分析</button></td>
      </tr>`;
    });
    html += '</table></div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<p style="color:var(--red);">搜索失败</p>';
  }
}

// ─── K线图表 ───
function showChart(code) {
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="chart"]').classList.add('active');
  document.getElementById('tab-chart').classList.add('active');
  document.getElementById('chartSearch').value = code;
  loadChart();
}

async function loadChart() {
  const code = document.getElementById('chartSearch').value.trim();
  if (!code) return;
  currentChartCode = code;

  document.getElementById('chartArea').style.display = 'block';
  document.getElementById('chartStockName').textContent = `📈 ${code} 技术分析`;
  document.getElementById('stockInfoPanel').innerHTML = '<p style="color:var(--text-dim);">加载中...</p>';

  try {
    const res = await fetch('/api/kline/' + code + '?count=120');
    const data = await res.json();
    if (data.error) {
      document.getElementById('stockInfoPanel').innerHTML = `<p style="color:var(--red);">${data.error}</p>`;
      return;
    }
    chartData = data;

    const stock = data.stock || {};
    document.getElementById('chartStockName').textContent =
      `📈 ${stock.name || code} (${stock.code || code})  ¥${(stock.price || 0).toFixed(2)}`;

    // 股票信息面板
    const sig = data.signal || {};
    let infoHtml = `
      <div style="display:grid; gap:8px;">
        <div><span style="color:var(--text-dim);">现价</span> <b>¥${(stock.price || 0).toFixed(2)}</b></div>
        <div><span style="color:var(--text-dim);">涨幅</span> <b class="${(stock.change_pct||0) >= 0 ? 'up' : 'down'}">${(stock.change_pct || 0) >= 0 ? '+' : ''}${(stock.change_pct || 0).toFixed(2)}%</b></div>
        <div><span style="color:var(--text-dim);">市值</span> ${(stock.market_cap || 0).toFixed(0)}亿</div>
        <div><span style="color:var(--text-dim);">换手率</span> ${(stock.turnover_rate || 0).toFixed(1)}%</div>
        <div><span style="color:var(--text-dim);">市盈率</span> ${(stock.pe || 0).toFixed(2)}</div>
        <hr style="border-color:var(--border); margin:8px 0;">
        <div><span style="color:var(--text-dim);">买入信号</span>
          ${sig.has_signal ? `<span class="tag tag-buy">${sig.type}</span>` : '<span style="color:var(--text-dim)">无</span>'}
        </div>
        ${sig.has_signal ? `<div style="font-size:12px; color:var(--text-dim);">${sig.reason}</div>` : ''}
        ${sig.has_signal ? `<div style="font-size:12px; margin-top:4px;">止损 <span style="color:var(--red);">${sig.stop_loss?.toFixed(2)}</span> 止盈 <span style="color:var(--green);">${sig.take_profit?.toFixed(2)}</span></div>` : ''}
        ${sig.has_signal ? `<div>可信度 <span class="tag tag-score">${sig.score}</span></div>` : ''}
      </div>`;
    document.getElementById('stockInfoPanel').innerHTML = infoHtml;

    // 渲染图表
    renderCharts(data.kline);
  } catch(e) {
    document.getElementById('stockInfoPanel').innerHTML = `<p style="color:var(--red);">加载失败: ${e.message}</p>`;
  }
}

function renderCharts(kline) {
  if (!kline || kline.length === 0) return;
  const dates = kline.map(d => d.date);
  const closes = kline.map(d => d.close);
  const volumes = kline.map(d => d.volume);

  // 销毁旧图表
  if (priceChart) { priceChart.destroy(); priceChart = null; }
  if (volumeChart) { volumeChart.destroy(); volumeChart = null; }

  // === 价格图表 ===
  const ctx1 = document.getElementById('priceChart').getContext('2d');
  const datasets = [{
    label: '收盘价', data: closes, borderColor: '#2196f3', backgroundColor: 'rgba(33,150,243,0.1)',
    fill: true, pointRadius: 0, borderWidth: 1.5, tension: 0.2, yAxisID: 'y'
  }];

  // 指标
  if (activeIndicators.includes('ma')) {
    ['MA5','MA10','MA20','MA60'].forEach((ma, i) => {
      const data = kline.map(d => d[ma]);
      const colors = ['#ff9800','#00c853','#e040fb','#536dfe'];
      if (data.some(v => v !== undefined)) {
        datasets.push({
          label: ma, data: data, borderColor: colors[i], borderWidth: 1,
          pointRadius: 0, tension: 0.2, yAxisID: 'y'
        });
      }
    });
  }
  if (activeIndicators.includes('boll')) {
    ['BOLL_UP','BOLL_MID','BOLL_DN'].forEach(b => {
      const data = kline.map(d => d[b]);
      if (data.some(v => v !== undefined)) {
        datasets.push({
          label: b, data: data, borderColor: '#e040fb', borderWidth: 0.8,
          pointRadius: 0, borderDash: [4,4], yAxisID: 'y'
        });
      }
    });
  }
  if (activeIndicators.includes('macd')) {
    const dif = kline.map(d => d.MACD_DIF);
    const dea = kline.map(d => d.MACD_DEA);
    const bar = kline.map(d => d.MACD_BAR);
    datasets.push({ label: 'MACD_DIF', data: dif, borderColor: '#ff9800', borderWidth: 1, pointRadius: 0, yAxisID: 'y1' });
    datasets.push({ label: 'MACD_DEA', data: dea, borderColor: '#e040fb', borderWidth: 1, pointRadius: 0, yAxisID: 'y1' });
    datasets.push({
      label: 'MACD_BAR', data: bar, borderColor: '#00c853', backgroundColor: bar.map(v => v >= 0 ? 'rgba(0,200,83,0.5)' : 'rgba(255,82,82,0.5)'),
      type: 'bar', yAxisID: 'y1', barPercentage: 0.5
    });
  }
  if (activeIndicators.includes('rsi')) {
    const rsi = kline.map(d => d.RSI);
    datasets.push({ label: 'RSI', data: rsi, borderColor: '#ff5252', borderWidth: 1.5, pointRadius: 0, yAxisID: 'y1', borderDash: [3,3] });
  }
  if (activeIndicators.includes('kdj')) {
    ['KDJ_K','KDJ_D','KDJ_J'].forEach(k => {
      const data = kline.map(d => d[k]);
      if (data.some(v => v !== undefined)) {
        datasets.push({
          label: k, data: data, borderWidth: 1, pointRadius: 0,
          borderColor: k === 'KDJ_K' ? '#ff9800' : k === 'KDJ_D' ? '#e040fb' : '#536dfe',
          yAxisID: 'y1'
        });
      }
    });
  }

  const hasY1 = datasets.some(d => d.yAxisID === 'y1');

  priceChart = new Chart(ctx1, {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8a9aa8', font: {size: 11}, boxWidth: 12 } }
      },
      scales: {
        x: { ticks: { color: '#8a9aa8', maxTicksLimit: 20, font: {size: 10} },
             grid: { color: 'rgba(42,58,74,0.3)' } },
        y: { position: 'left', ticks: { color: '#8a9aa8', font: {size: 10} },
             grid: { color: 'rgba(42,58,74,0.3)' } },
        y1: { position: 'right', display: hasY1, ticks: { color: '#8a9aa8', font: {size: 10} },
              grid: { display: false } }
      }
    }
  });

  // === 成交量图 ===
  const ctx2 = document.getElementById('volumeChart').getContext('2d');
  const volData = kline.map(d => d.volume / 1e4);
  const volColors = kline.map(d => d.close >= (kline[0]?.open || 0) ? 'rgba(255,82,82,0.4)' : 'rgba(0,200,83,0.4)');

  volumeChart = new Chart(ctx2, {
    type: 'bar',
    data: {
      labels: dates,
      datasets: [{
        label: '成交量(万手)', data: volData, backgroundColor: volColors, borderWidth: 0
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8a9aa8', font: {size: 10} } } },
      scales: {
        x: { ticks: { color: '#8a9aa8', maxTicksLimit: 20, font: {size: 9} },
             grid: { color: 'rgba(42,58,74,0.3)' } },
        y: { ticks: { color: '#8a9aa8', font: {size: 9} },
             grid: { color: 'rgba(42,58,74,0.3)' } }
      }
    }
  });
}

function toggleIndicator(name) {
  const idx = activeIndicators.indexOf(name);
  if (idx >= 0) {
    activeIndicators.splice(idx, 1);
    document.querySelector(`[data-indicator="${name}"]`).classList.remove('active');
  } else {
    activeIndicators.push(name);
    document.querySelector(`[data-indicator="${name}"]`).classList.add('active');
  }
  if (chartData && chartData.kline) renderCharts(chartData.kline);
}

// ─── 回测 ───
async function runBacktest() {
  const codesStr = document.getElementById('chartSearch').value.trim() || '600519';
  const codes = codesStr.split(',').map(c => c.trim()).filter(Boolean);
  const days = document.getElementById('backtestDays').value || 120;

  const el = document.getElementById('backtestResults');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px;">运行回测中...</p></div>';

  try {
    const res = await fetch('/api/backtest', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({codes, days: parseInt(days)})
    });
    const data = await res.json();
    if (data.error) {
      el.innerHTML = `<p style="color:var(--red);">${data.error}</p>`;
      return;
    }
    if (!data.results || data.results.length === 0) {
      el.innerHTML = '<p style="color:var(--text-dim);">回测无结果</p>';
      return;
    }

    let html = `<p style="margin-bottom:12px; color:var(--text-dim);">回测周期: ${days}天 · ${data.count}只标的</p>`;
    html += '<div class="table-wrap"><table><tr><th>代码</th><th>名称</th><th>总收益</th><th>年化</th><th>最大回撤</th><th>胜率</th><th>夏普</th><th>交易次数</th><th>盈亏比</th></tr>';
    data.results.forEach(r => {
      html += `<tr>
        <td><a class="code-link" onclick="showChart('${r.代码}')">${r.代码}</a></td>
        <td>${r.名称 || ''}</td>
        <td class="${r.总收益率 >= 0 ? 'up' : 'down'}">${r.总收益率 >= 0 ? '+' : ''}${(r.总收益率 || 0).toFixed(2)}%</td>
        <td class="${r.年化收益率 >= 0 ? 'up' : 'down'}">${(r.年化收益率 || 0).toFixed(2)}%</td>
        <td class="down">${(r.最大回撤 || 0).toFixed(2)}%</td>
        <td>${(r.胜率 || 0).toFixed(1)}%</td>
        <td>${(r.夏普比率 || 0).toFixed(2)}</td>
        <td>${r.交易次数 || 0}</td>
        <td>${(r.盈亏比 || 0).toFixed(2)}</td>
      </tr>`;
    });
    html += '</table></div>';

    // 单个回测详细
    for (const result of data.results) {
      try {
        const detailRes = await fetch(`/api/backtest/${result.代码}?days=${days}`);
        const detail = await detailRes.json();
        if (detail.trades && detail.trades.length > 0) {
          html += `<div class="card" style="margin-top:12px;">
            <div class="card-title">📋 ${result.名称 || result.代码} 交易明细 (${detail.trade_count}笔)</div>
            <div class="backtest-metrics">
              <div class="metric-card"><div class="val ${detail.total_return >= 0 ? 'up' : 'down'}">${detail.total_return >= 0 ? '+' : ''}${detail.total_return.toFixed(2)}%</div><div class="lbl">总收益</div></div>
              <div class="metric-card"><div class="val">${detail.win_rate.toFixed(1)}%</div><div class="lbl">胜率</div></div>
              <div class="metric-card"><div class="val down">${detail.max_drawdown.toFixed(2)}%</div><div class="lbl">最大回撤</div></div>
              <div class="metric-card"><div class="val">${detail.sharpe_ratio.toFixed(2)}</div><div class="lbl">夏普比率</div></div>
              <div class="metric-card"><div class="val">${detail.trade_count}</div><div class="lbl">交易次数</div></div>
              <div class="metric-card"><div class="val">${detail.profit_loss_ratio.toFixed(2)}</div><div class="lbl">盈亏比</div></div>
            </div>`;
          if (detail.trades.length > 20) detail.trades = detail.trades.slice(-20);
          html += '<div class="table-wrap"><table><tr><th>买入日</th><th>卖出日</th><th>方向</th><th>买入价</th><th>卖出价</th><th>盈亏</th><th>策略</th></tr>';
          detail.trades.forEach(t => {
            const pnl = t.盈亏 || t['盈亏%'] || 0;
            html += `<tr>
              <td>${t.买入日期 || ''}</td>
              <td>${t.卖出日期 || ''}</td>
              <td>${t.方向 || ''}</td>
              <td>${t.买入价 || t.买入价格 || ''}</td>
              <td>${t.卖出价 || t.卖出价格 || ''}</td>
              <td class="${pnl > 0 ? 'up' : 'down'}">${typeof pnl === 'number' ? pnl.toFixed(2) + '%' : pnl}</td>
              <td style="font-size:11px;color:var(--text-dim)">${(t.策略 || t.卖出原因 || '').substring(0, 30)}</td>
            </tr>`;
          });
          html += '</table></div></div>';
        }
      } catch(e) {}
    }

    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<p style="color:var(--red);">回测失败: ${e.message}</p>`;
  }
}
